name: Deploy to GitHub Pages

# Builds the static export and publishes it to GitHub Pages. The site is purely
# client-side (it never deploys your cloud — it generates files you run), so a
# static export is a complete, faithful copy of the builder.
#
# Manual trigger for now: run it from the Actions tab ("Run workflow") when you
# want to (re)publish. The configure-pages step below self-enables Pages, so
# there's no separate Settings step. On the SoloNerds Enterprise plan you can
# keep the published site PRIVATE (Settings → Pages → Visibility) — the repo
# stays private regardless.
#
# When you open-source this, add `push: { branches: [main] }` under `on:` to
# republish automatically on every push.

on:
  workflow_dispatch:

# Allow this workflow to publish to Pages via OIDC.
permissions:
  contents: read
  pages: write
  id-token: write

# One concurrent deploy; let an in-progress run finish rather than cancelling.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: yarn
      - run: yarn install --frozen-lockfile
      - name: Build static export
        # Serve under /<repo> so asset URLs resolve on a project Pages site.
        # Using the repo name keeps this correct for forks automatically.
        env:
          PAGES_BASE_PATH: /${{ github.event.repository.name }}
        run: yarn build
      # enablement: true turns Pages on automatically the first time this runs,
      # so you don't have to flip any repo setting first.
      - uses: actions/configure-pages@v5
        with:
          enablement: true
      - uses: actions/upload-pages-artifact@v3
        with:
          path: ./out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
