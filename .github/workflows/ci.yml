name: CI

on:
  push:
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: yarn
      - run: yarn install --frozen-lockfile
      - run: yarn lint
      - run: yarn format:check
      - run: yarn test
      - run: yarn build
      - run: yarn build:cli
      # The drop-in bundle (scripts/sst-dream.mjs) is committed; fail if it's stale.
      - name: Verify committed CLI bundle is current
        run: git diff --exit-code -- scripts/sst-dream.mjs
      - run: yarn typecheck
