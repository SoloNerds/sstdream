name: Feature request
description: A new resource kind, edge, validation rule, lane, or builder capability.
labels: [enhancement]
body:
  - type: dropdown
    id: kind
    attributes:
      label: What kind of feature?
      options:
        - New resource kind (catalog)
        - New connection / edge intent
        - New validation rule
        - New deploy lane
        - Builder UI / UX
        - Cost / simulation / recommendations
        - Other
    validations:
      required: true
  - type: textarea
    id: problem
    attributes:
      label: What problem does it solve?
      description: The design or deploy scenario you can't express today.
    validations:
      required: true
  - type: textarea
    id: verified
    attributes:
      label: Verified target fact (for generator features)
      description: |
        Correctness is the product. If this emits IaC, link the authoritative source
        (SST / Vercel docs) for the exact API shape so it can be recorded in `docs/`.
  - type: textarea
    id: notes
    attributes:
      label: Anything else?
